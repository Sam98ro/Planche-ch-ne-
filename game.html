<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Feuilles de Chêne — La Planche by SR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#080506;font-family:'Inter',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
    canvas{display:block;position:fixed;inset:0}

    /* ── Screens ── */
    .screen{
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:1.4rem;
      text-align:center;padding:2rem;
      background:rgba(8,5,6,0.82);backdrop-filter:blur(10px);
      transition:opacity .45s ease,transform .45s ease;
      z-index:10;
    }
    .screen.off{opacity:0;pointer-events:none;transform:scale(.97)}

    .s-by{font-size:.6rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:rgba(212,146,42,.55)}
    .s-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,9vw,5.5rem);font-weight:300;color:#FAFAF6;line-height:1;letter-spacing:-.02em}
    .s-title em{font-style:italic;color:#D4922A}
    .s-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.95rem,2.5vw,1.3rem);font-weight:300;color:rgba(250,250,246,.45);letter-spacing:.04em}
    .s-hint{font-size:.78rem;color:rgba(250,250,246,.35);font-weight:300;line-height:1.75}
    .s-div{width:40px;height:1px;background:rgba(212,146,42,.35)}
    .s-score-label{font-size:.58rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:rgba(212,146,42,.55)}
    .s-score{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,7vw,4rem);font-weight:300;color:#FAFAF6;letter-spacing:-.02em}
    .s-best{font-size:.8rem;color:rgba(250,250,246,.35);font-weight:300}
    .s-best strong{color:#D4922A;font-weight:600}
    .s-newbest{font-size:.78rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#D4922A;display:none}

    .btn{
      font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;
      letter-spacing:.16em;text-transform:uppercase;
      color:#080506;background:#D4922A;border:none;
      padding:1.05rem 3rem;border-radius:4px;cursor:pointer;
      transition:background .22s,transform .18s;
    }
    .btn:hover{background:#E8A840;transform:translateY(-2px)}
    .btn:active{transform:translateY(0)}

    /* ── HUD ── */
    #hud{
      position:fixed;top:0;left:0;right:0;
      padding:1.1rem 1.5rem;
      display:flex;align-items:center;justify-content:space-between;
      pointer-events:none;z-index:5;
      transition:opacity .3s;
    }
    #hud.off{opacity:0}
    .hud-block{display:flex;flex-direction:column;align-items:center;gap:.15rem}
    .hud-label{font-size:.52rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:rgba(212,146,42,.5)}
    .hud-val{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:300;color:rgba(250,250,246,.9);letter-spacing:-.01em;line-height:1}
    .hud-lives{display:flex;gap:.45rem;align-items:center}
    .heart{font-size:1.25rem;transition:transform .2s,opacity .2s;filter:drop-shadow(0 0 5px rgba(210,70,60,.6))}
    .heart.lost{filter:none;opacity:.18}

    /* ── Combo ── */
    #combo{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(3.5rem,12vw,7rem);font-weight:300;
      color:#D4922A;
      text-shadow:0 0 50px rgba(212,146,42,.45),0 0 100px rgba(212,100,20,.2);
      pointer-events:none;z-index:6;
      opacity:0;transition:opacity .3s;
    }
    #combo.pop{animation:comboPop .55s cubic-bezier(.25,.46,.45,.94) forwards}
    @keyframes comboPop{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
      55%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}
      100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    }

    /* ── Back link ── */
    #back{
      position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);
      font-size:.58rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
      color:rgba(250,250,246,.25);text-decoration:none;
      transition:color .25s;z-index:15;
    }
    #back:hover{color:rgba(250,250,246,.55)}
  </style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud" class="off">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-val" id="hScore">0</div>
  </div>
  <div class="hud-lives" id="hLives"></div>
  <div class="hud-block">
    <div class="hud-label">Niveau</div>
    <div class="hud-val" id="hLevel">1</div>
  </div>
</div>

<!-- Combo -->
<div id="combo"></div>

<!-- Start -->
<div id="sStart" class="screen">
  <div class="s-by">La Planche by SR</div>
  <div class="s-title">Feuilles<br>de <em>Chêne</em></div>
  <div class="s-sub">Cueillez les feuilles avant qu'elles tombent</div>
  <div class="s-div"></div>
  <div class="s-hint">Cliquez ou tapez sur chaque feuille<br>Enchaînez les prises pour un multiplicateur</div>
  <button class="btn" id="btnStart">Jouer</button>
  <div class="s-best" id="sBestWrap" style="display:none">Meilleur score&ensp;<strong id="sBest">0</strong></div>
</div>

<!-- Game Over -->
<div id="sOver" class="screen off">
  <div class="s-by">Partie terminée</div>
  <div class="s-title"><em>Bravo</em></div>
  <div class="s-div"></div>
  <div class="s-score-label">Votre score</div>
  <div class="s-score" id="oScore">0</div>
  <div class="s-newbest" id="oNew">✦ Nouveau record</div>
  <div class="s-best">Meilleur&ensp;<strong id="oBest">0</strong></div>
  <button class="btn" id="btnRestart">Rejouer</button>
</div>

<a href="index.html" id="back">← La boutique</a>

<script>
(function(){
'use strict';

/* ─── Canvas + DPR ─── */
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W, H, dpr;

function resize(){
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  initStars();
}
window.addEventListener('resize', resize);

/* ─── State ─── */
const S = {MENU:0, PLAY:1, OVER:2};
let state = S.MENU;

/* ─── Game vars ─── */
let score, lives, level, combo, caught;
let leaves, parts, popups, stars;
let spawnT, spawnI, spdMult;
let lastT = 0;
let mouseX = -999, mouseY = -999;
let shakeT = 0;

/* ─── Leaf colors (autumn oak palette) ─── */
const COLS = ['#D46822','#E8942A','#C93B28','#D4A028','#B87828','#C84828','#E8B050','#9A4E1A'];

/* ─── Oak leaf path (normalized, base ~48px tall, ±16px wide) ─── */
function drawOakLeaf(x, y, sz, ang, col){
  const s = sz / 24;
  cx.save();
  cx.translate(x, y);
  cx.rotate(ang);
  cx.scale(s, s);

  cx.beginPath();
  cx.moveTo(0, 22);

  /* right side — 3 lobes ascending */
  cx.bezierCurveTo(4,16, 16,16, 16,10);
  cx.bezierCurveTo(16,5, 8,2, 5,4);
  cx.bezierCurveTo(12,-1, 18,-9, 13,-15);
  cx.bezierCurveTo(10,-19, 5,-16, 3,-12);
  cx.bezierCurveTo(6,-16, 9,-23, 5,-25);
  cx.bezierCurveTo(2,-27, -1,-24, 0,-20);
  cx.lineTo(0,-24);

  /* left side — mirror */
  cx.bezierCurveTo(1,-24, -2,-27, -5,-25);
  cx.bezierCurveTo(-9,-23, -6,-16, -3,-12);
  cx.bezierCurveTo(-5,-16, -10,-19, -13,-15);
  cx.bezierCurveTo(-18,-9, -12,-1, -5,4);
  cx.bezierCurveTo(-8,2, -16,5, -16,10);
  cx.bezierCurveTo(-16,16, -4,16, 0,22);
  cx.closePath();

  /* gradient fill */
  const g = cx.createRadialGradient(0,-6,1, 0,-6,20);
  g.addColorStop(0, lighten(col,28));
  g.addColorStop(1, col);
  cx.fillStyle = g;
  cx.fill();

  /* subtle edge */
  cx.strokeStyle = 'rgba(255,255,255,.07)';
  cx.lineWidth = .6;
  cx.stroke();

  /* veins */
  cx.strokeStyle = 'rgba(0,0,0,.22)';
  cx.lineCap = 'round';
  cx.lineWidth = .9;
  cx.beginPath(); cx.moveTo(0,18); cx.lineTo(0,-23); cx.stroke();
  cx.lineWidth = .45;
  [[0,10,9,4],[0,10,-9,4],[0,4,11,-4],[0,4,-11,-4],[0,-3,10,-12],[0,-3,-10,-12]].forEach(([x1,y1,x2,y2])=>{
    cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.stroke();
  });

  /* stem */
  cx.lineWidth = 1.6;
  cx.strokeStyle = '#7A4A1E';
  cx.beginPath(); cx.moveTo(0,22); cx.quadraticCurveTo(1.5,27,0,30); cx.stroke();

  cx.restore();
}

function lighten(hex, amt){
  const n = parseInt(hex.slice(1),16);
  const r = Math.min(255,(n>>16)+amt), g = Math.min(255,((n>>8)&0xFF)+amt), b = Math.min(255,(n&0xFF)+amt);
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

/* ─── Stars ─── */
function initStars(){
  stars = [];
  const n = Math.floor(W*H/7000);
  for(let i=0;i<n;i++) stars.push({
    x:Math.random()*W, y:Math.random()*H*.65,
    r:.3+Math.random()*1.1,
    a:.08+Math.random()*.35,
    p:Math.random()*Math.PI*2,
    ps:.008+Math.random()*.018
  });
}

/* ─── Background ─── */
function drawBg(){
  const bg = cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050304');
  bg.addColorStop(.5,'#0A0706');
  bg.addColorStop(1,'#160C05');
  cx.fillStyle = bg; cx.fillRect(0,0,W,H);

  stars.forEach(s=>{
    s.p += s.ps;
    cx.beginPath();
    cx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    cx.fillStyle = `rgba(253,252,248,${s.a+Math.sin(s.p)*.12})`;
    cx.fill();
  });

  /* ground warmth */
  const gr = cx.createLinearGradient(0,H*.7,0,H);
  gr.addColorStop(0,'rgba(100,48,8,0)');
  gr.addColorStop(1,'rgba(50,22,4,.45)');
  cx.fillStyle=gr; cx.fillRect(0,H*.7,W,H*.3);

  drawTree();
}

function drawTree(){
  const tx=W*.5, ty=H, th=H*.46;
  cx.save();
  cx.fillStyle='rgba(5,3,2,.92)';

  /* trunk */
  cx.beginPath();
  cx.moveTo(tx-18,ty);
  cx.bezierCurveTo(tx-14,ty-th*.3, tx-9,ty-th*.52, tx-4,ty-th*.6);
  cx.bezierCurveTo(tx-1,ty-th*.65, tx,ty-th*.7, tx,ty-th*.72);
  cx.bezierCurveTo(tx,ty-th*.7, tx+1,ty-th*.65, tx+4,ty-th*.6);
  cx.bezierCurveTo(tx+9,ty-th*.52, tx+14,ty-th*.3, tx+18,ty);
  cx.closePath(); cx.fill();

  cx.strokeStyle='rgba(5,3,2,.9)';
  cx.lineCap='round';

  /* branches */
  const br = (lw,x1,y1,cp1x,cp1y,cp2x,cp2y,x2,y2)=>{
    cx.lineWidth=lw;
    cx.beginPath(); cx.moveTo(x1,y1); cx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x2,y2); cx.stroke();
  };
  br(11, tx,ty-th*.7,  tx-22,ty-th*.75, tx-55,ty-th*.68, tx-75,ty-th*.61);
  br(11, tx,ty-th*.72, tx+20,ty-th*.77, tx+52,ty-th*.7,  tx+78,ty-th*.64);
  br(7,  tx,ty-th*.72, tx-8,ty-th*.82,  tx-24,ty-th*.88, tx-42,ty-th*.87);
  br(7,  tx,ty-th*.72, tx+7,ty-th*.84,  tx+22,ty-th*.9,  tx+40,ty-th*.9);
  br(4,  tx-42,ty-th*.87, tx-52,ty-th*.92, tx-60,ty-th*.95, tx-68,ty-th*.97);
  br(4,  tx+40,ty-th*.9,  tx+50,ty-th*.94, tx+57,ty-th*.97, tx+64,ty-th*.99);
  br(3,  tx-75,ty-th*.61, tx-80,ty-th*.65, tx-82,ty-th*.7, tx-78,ty-th*.72);
  br(3,  tx+78,ty-th*.64, tx+83,ty-th*.68, tx+85,ty-th*.73, tx+80,ty-th*.75);

  cx.restore();
}

/* ─── Leaf class ─── */
class Leaf {
  constructor(){
    this.size  = 20+Math.random()*22;
    this.x     = Math.random()*W;
    this.y     = -this.size*2 - Math.random()*60;
    this.vx    = (Math.random()-.5)*1.4;
    this.vy    = (.7+Math.random()*1.1)*spdMult;
    this.rot   = Math.random()*Math.PI*2;
    this.rotV  = (Math.random()-.5)*.055;
    this.sway  = Math.random()*Math.PI*2;
    this.swayA = .7+Math.random()*1.3;
    this.swayS = .018+Math.random()*.022;
    this.col   = COLS[Math.floor(Math.random()*COLS.length)];
    this.alpha = 0;
    this.alive = true;
  }
  update(){
    this.sway += this.swayS;
    this.x    += this.vx + Math.sin(this.sway)*this.swayA;
    this.y    += this.vy;
    this.rot  += this.rotV;
    this.alpha = Math.min(1, this.alpha+.06);
  }
  draw(){
    cx.save(); cx.globalAlpha=this.alpha;
    drawOakLeaf(this.x, this.y, this.size, this.rot, this.col);
    cx.restore();
  }
  offScreen(){ return this.y > H+this.size*2; }
  hit(px,py){ const d=Math.hypot(px-this.x,py-this.y); return d < this.size*1.7; }
}

/* ─── Particle ─── */
class Particle {
  constructor(x,y,col){
    const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*4.5;
    this.x=x; this.y=y;
    this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp-2.5;
    this.col=col;
    this.sz=2.5+Math.random()*5.5;
    this.life=1; this.dec=.02+Math.random()*.025;
    this.rot=Math.random()*Math.PI*2; this.rotV=(Math.random()-.5)*.18;
    this.g=.1;
  }
  update(){ this.vx*=.97; this.vy+=this.g; this.x+=this.vx; this.y+=this.vy; this.life-=this.dec; this.rot+=this.rotV; }
  draw(){
    cx.save(); cx.globalAlpha=Math.max(0,this.life);
    cx.translate(this.x,this.y); cx.rotate(this.rot);
    cx.fillStyle=this.col;
    cx.beginPath(); cx.ellipse(0,0,this.sz,this.sz*.45,0,0,Math.PI*2); cx.fill();
    cx.restore();
  }
  dead(){ return this.life<=0; }
}

/* ─── Score popup ─── */
class Popup {
  constructor(x,y,txt,col){
    this.x=x; this.y=y; this.txt=txt; this.col=col||'#FAFAF6';
    this.life=1; this.vy=-1.6;
  }
  update(){ this.y+=this.vy; this.vy*=.94; this.life-=.022; }
  draw(){
    cx.save(); cx.globalAlpha=Math.max(0,this.life);
    cx.font = `300 ${22+Math.round((1-this.life)*6)}px 'Cormorant Garamond',serif`;
    cx.fillStyle=this.col; cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(this.txt, this.x, this.y);
    cx.restore();
  }
  dead(){ return this.life<=0; }
}

/* ─── Audio ─── */
let ac;
function audio(){
  if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)();
}
function tone(type, freq, freq2, dur, vol){
  if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type=type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if(freq2) o.frequency.exponentialRampToValueAtTime(freq2, ac.currentTime+dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+dur);
  o.start(ac.currentTime); o.stop(ac.currentTime+dur);
}
function sndCatch(){ tone('sine', 380+Math.random()*200, 720+Math.random()*300, .2, .1); }
function sndCombo(){
  [1,1.26,1.587].forEach((m,i)=>setTimeout(()=>tone('sine',523*m,0,.28,.08), i*75));
}
function sndMiss(){
  tone('sawtooth',130,55,.35,.07);
}

/* ─── HUD helpers ─── */
function hud(){
  document.getElementById('hScore').textContent=score;
  document.getElementById('hLevel').textContent=level;
  const el=document.getElementById('hLives');
  el.innerHTML='';
  for(let i=0;i<3;i++){
    const h=document.createElement('div');
    h.className='heart'+(i>=lives?' lost':'');
    h.textContent='♥'; el.appendChild(h);
  }
}

/* ─── Combo display ─── */
let comboTO;
function showCombo(n){
  const el=document.getElementById('combo');
  el.textContent=n+'×';
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  el.style.opacity='1';
  clearTimeout(comboTO);
  comboTO=setTimeout(()=>{ el.style.opacity='0'; el.classList.remove('pop'); },1600);
}

/* ─── Init ─── */
function initGame(){
  score=0; lives=3; level=1; combo=0; caught=0;
  spdMult=1; spawnT=0; spawnI=2000;
  leaves=[]; parts=[]; popups=[];
  hud();
}

function spawnLeaf(){
  leaves.push(new Leaf());
  if(level>=3 && Math.random()<.32) leaves.push(new Leaf());
  if(level>=6 && Math.random()<.22) leaves.push(new Leaf());
}

function catchLeaf(leaf){
  leaf.alive=false; caught++; combo++;
  const sizePts = Math.round((42-leaf.size)/4);
  const mult = combo>=5?combo:combo>=3?3:1;
  const pts = Math.max(5, (10+sizePts)*mult);
  score+=pts;

  /* particles */
  const pn=Math.min(28,10+combo*2);
  for(let i=0;i<pn;i++) parts.push(new Particle(leaf.x,leaf.y,leaf.col));

  /* glow flash */
  parts.push({
    x:leaf.x, y:leaf.y, life:1, dec:.08,
    update(){ this.life-=this.dec; },
    draw(){
      cx.save();
      const r=leaf.size*(3-this.life*2);
      const g=cx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);
      g.addColorStop(0,`rgba(212,180,80,${.35*this.life})`);
      g.addColorStop(1,'rgba(212,120,20,0)');
      cx.fillStyle=g;
      cx.beginPath(); cx.arc(this.x,this.y,r,0,Math.PI*2); cx.fill();
      cx.restore();
    },
    dead(){ return this.life<=0; }
  });

  /* popup */
  const pCol = combo>=5?'#FFCC44':combo>=3?'#E8C080':'#FAFAF6';
  popups.push(new Popup(leaf.x, leaf.y-leaf.size, combo>=3?`+${pts} ×${mult}`:`+${pts}`, pCol));

  if(combo>=3) showCombo(combo);
  if(combo>=3) sndCombo(); else sndCatch();

  /* level */
  if(caught>0 && caught%8===0) levelUp();
  hud();
}

function missLeaf(leaf){
  leaf.alive=false; combo=0; lives--;
  sndMiss(); shakeT=350; hud();
  if(lives<=0) endGame();
}

function levelUp(){
  level++;
  spdMult=1+(level-1)*.14;
  spawnI=Math.max(700, 2000-(level-1)*175);
  popups.push(new Popup(W/2, H/2, `Niveau ${level}`, '#D4922A'));
}

function endGame(){
  state=S.OVER;
  document.getElementById('hud').classList.add('off');
  const best=+localStorage.getItem('lp_oak_best')||0;
  const isNew=score>best;
  if(isNew) localStorage.setItem('lp_oak_best',score);
  document.getElementById('oScore').textContent=score;
  document.getElementById('oBest').textContent=isNew?score:best;
  document.getElementById('oNew').style.display=isNew?'block':'none';
  document.getElementById('sOver').classList.remove('off');
}

function startGame(){
  document.getElementById('sStart').classList.add('off');
  document.getElementById('sOver').classList.add('off');
  document.getElementById('hud').classList.remove('off');
  initGame(); state=S.PLAY;
}

/* ─── Input ─── */
function onTap(px,py){
  if(state!==S.PLAY) return;
  audio();
  let best=null, bestD=Infinity;
  for(const l of leaves){
    if(!l.alive) continue;
    const d=Math.hypot(px-l.x, py-l.y);
    if(d < l.size*1.8 && d<bestD){ bestD=d; best=l; }
  }
  if(best) catchLeaf(best);
}

cv.addEventListener('click', e=>onTap(e.clientX,e.clientY));
cv.addEventListener('touchstart', e=>{ e.preventDefault(); for(const t of e.changedTouches) onTap(t.clientX,t.clientY); },{passive:false});
cv.addEventListener('mousemove', e=>{ mouseX=e.clientX; mouseY=e.clientY; });
cv.addEventListener('mouseleave', ()=>{ mouseX=-999; mouseY=-999; });

document.getElementById('btnStart').addEventListener('click', ()=>{ audio(); startGame(); });
document.getElementById('btnRestart').addEventListener('click', ()=>{ audio(); startGame(); });

/* ─── Main loop ─── */
function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min(ts-lastT, 50);
  lastT = ts;

  cx.clearRect(0,0,W,H);

  /* shake offset */
  let sx=0, sy=0;
  if(shakeT>0){ shakeT-=dt; const f=shakeT/350; sx=(Math.random()-.5)*7*f; sy=(Math.random()-.5)*7*f; }

  cx.save();
  if(sx||sy) cx.translate(sx,sy);

  drawBg();

  if(state===S.PLAY){
    spawnT+=dt;
    if(spawnT>=spawnI){ spawnT=0; spawnLeaf(); }

    /* leaves */
    const toMiss=[];
    leaves=leaves.filter(l=>l.alive);
    for(const l of leaves){ l.update(); l.draw(); if(l.offScreen()) toMiss.push(l); }
    for(const l of toMiss) missLeaf(l);

    /* particles / popups */
    parts.forEach(p=>{ p.update(); p.draw(); });
    parts=parts.filter(p=>!p.dead());
    popups.forEach(p=>{ p.update(); p.draw(); });
    popups=popups.filter(p=>!p.dead());

    /* cursor glow */
    if(mouseX>0){
      const mg=cx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,38);
      mg.addColorStop(0,'rgba(212,146,42,.13)');
      mg.addColorStop(1,'rgba(212,146,42,0)');
      cx.fillStyle=mg;
      cx.beginPath(); cx.arc(mouseX,mouseY,38,0,Math.PI*2); cx.fill();
    }
  } else {
    /* menu/over — a few ambient leaves */
    spawnT+=dt;
    if(spawnT>=3000 && leaves.length<6){ spawnT=0; leaves.push(new Leaf()); }
    leaves=leaves.filter(l=>{ l.update(); l.draw(); return !l.offScreen(); });
  }

  cx.restore();
}

/* ─── Boot ─── */
resize();
spdMult=1; leaves=[]; parts=[]; popups=[];
const saved=+localStorage.getItem('lp_oak_best')||0;
if(saved>0){ document.getElementById('sBestWrap').style.display='block'; document.getElementById('sBest').textContent=saved; }
lastT=performance.now();
requestAnimationFrame(loop);

})();
</script>
